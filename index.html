<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Business Statistics – Complete Learning Roadmap</title>
<style>
  :root {
    --bg: #0a0a14;
    --bg2: #0d0d1e;
    --bg3: #0e0e20;
    --bg4: #12122a;
    --bg5: #14142a;
    --border: #1e1e3a;
    --border2: #2a2a4a;
    --text: #e8e8e8;
    --muted: #888;
    --dim: #555;
    --teal: #4ECDC4;
    --purple: #A78BFA;
    --red: #FF6B6B;
    --orange: #F97316;
    --green: #34D399;
    --yellow: #E8C547;
    --coursera: #0056D2;
    --youtube: #FF0000;
    --khan: #14BF96;
    --nptel: #FF6B00;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    background: var(--bg);
    color: var(--text);
    font-family: Georgia, 'Times New Roman', serif;
    min-height: 100vh;
    line-height: 1.5;
  }
  a { text-decoration: none; }
  a:hover { opacity: 0.8; }

  /* HEADER */
  .header {
    background: linear-gradient(135deg, #0a0a14 0%, #12122a 50%, #0a0a14 100%);
    border-bottom: 1px solid #2a2a4a;
    padding: 44px 24px 36px;
    text-align: center;
    position: relative;
    overflow: hidden;
  }
  .header::before {
    content: '';
    position: absolute; inset: 0;
    background: radial-gradient(circle at 20% 50%, rgba(78,205,196,0.06) 0%, transparent 50%),
                radial-gradient(circle at 80% 50%, rgba(168,139,250,0.06) 0%, transparent 50%);
    pointer-events: none;
  }
  .header-eyebrow {
    font-size: 11px; letter-spacing: 6px; color: var(--teal);
    text-transform: uppercase; margin-bottom: 12px;
  }
  .header h1 {
    font-size: clamp(22px, 4vw, 38px);
    font-weight: normal; letter-spacing: 1px; color: #fff;
    margin-bottom: 8px;
  }
  .header-sub { color: var(--muted); font-size: 14px; margin-bottom: 28px; }
  .progress-wrap { max-width: 480px; margin: 0 auto; }
  .progress-labels {
    display: flex; justify-content: space-between;
    margin-bottom: 8px; font-size: 12px; color: var(--muted);
  }
  .progress-labels span:last-child { color: var(--teal); font-weight: bold; }
  .progress-bar-bg {
    height: 6px; background: #1e1e3a; border-radius: 3px; overflow: hidden;
  }
  .progress-bar-fill {
    height: 100%; width: 0%;
    background: linear-gradient(90deg, var(--teal), var(--purple));
    border-radius: 3px;
    transition: width 0.5s ease;
  }

  /* PHASE NAV */
  .phase-nav {
    display: flex; gap: 8px; padding: 14px 20px;
    overflow-x: auto; border-bottom: 1px solid var(--border);
    background: var(--bg2); scrollbar-width: none;
  }
  .phase-nav::-webkit-scrollbar { display: none; }
  .phase-btn {
    padding: 6px 14px; border-radius: 20px; cursor: pointer;
    font-size: 12px; letter-spacing: 1px; white-space: nowrap;
    font-family: Georgia, serif; background: transparent;
    transition: background 0.2s;
  }
  .phase-btn:hover { opacity: 0.85; }

  /* MAIN */
  .main { max-width: 860px; margin: 0 auto; padding: 32px 16px 64px; }

  /* PHASE BLOCK */
  .phase-block { margin-bottom: 48px; }
  .phase-header {
    display: flex; align-items: center; gap: 14px;
    margin-bottom: 22px; padding-bottom: 12px;
  }
  .phase-circle {
    width: 44px; height: 44px; border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    font-size: 12px; font-weight: bold; flex-shrink: 0;
  }
  .phase-title-wrap .phase-label {
    font-size: 10px; letter-spacing: 4px; text-transform: uppercase;
  }
  .phase-title-wrap .phase-name { font-size: 20px; color: #fff; letter-spacing: 0.5px; }
  .phase-count { margin-left: auto; font-size: 12px; color: #666; }

  /* LECTURE CARD */
  .lecture-list { display: flex; flex-direction: column; gap: 10px; }
  .lecture-card {
    border: 1px solid var(--border);
    border-radius: 10px; overflow: hidden;
    background: var(--bg3);
    transition: border-color 0.3s;
  }
  .lecture-card.done { background: rgba(78,205,196,0.03); }
  .lecture-header {
    display: flex; align-items: center; gap: 12px;
    padding: 14px 18px; cursor: pointer; user-select: none;
  }
  .lecture-header:hover { background: rgba(255,255,255,0.02); }
  .check-circle {
    width: 22px; height: 22px; border-radius: 50%;
    border: 2px solid #444;
    display: flex; align-items: center; justify-content: center;
    flex-shrink: 0; cursor: pointer;
    transition: all 0.2s; font-size: 11px; font-weight: bold; color: #000;
  }
  .check-circle.checked { background: var(--teal); border-color: var(--teal); }
  .lec-num {
    width: 28px; height: 28px; border-radius: 6px;
    display: flex; align-items: center; justify-content: center;
    font-size: 11px; font-weight: bold; flex-shrink: 0;
  }
  .lec-title { font-size: 15px; letter-spacing: 0.3px; color: var(--text); }
  .lec-title.done { text-decoration: line-through; color: #666; }
  .lec-meta { font-size: 11px; color: #555; margin-top: 2px; }
  .lec-arrow {
    margin-left: auto; font-size: 16px; color: #444;
    transition: transform 0.3s; display: inline-block;
  }
  .lec-arrow.open { transform: rotate(180deg); }

  /* EXPANDED */
  .lecture-body { padding: 0 18px 18px; border-top: 1px solid var(--border); }
  .section-label {
    font-size: 10px; letter-spacing: 3px; color: var(--dim);
    text-transform: uppercase; margin: 16px 0 10px;
  }
  .topics-wrap { display: flex; flex-wrap: wrap; gap: 7px; }
  .topic-pill {
    padding: 4px 10px; background: var(--bg5);
    border: 1px solid var(--border2); border-radius: 4px;
    font-size: 12px; color: #bbb;
  }
  .resources-list { display: flex; flex-direction: column; gap: 8px; }
  .resource-row {
    display: flex; align-items: flex-start; gap: 12px;
    padding: 10px 14px; background: var(--bg4);
    border-radius: 8px; border: 1px solid var(--border);
  }
  .resource-row.primary-res { border-color: #2a2a5a; }
  .platform-icon {
    width: 28px; height: 28px; border-radius: 6px;
    display: flex; align-items: center; justify-content: center;
    font-size: 13px; flex-shrink: 0; margin-top: 1px;
  }
  .resource-info { flex: 1; }
  .resource-top { display: flex; align-items: center; gap: 8px; flex-wrap: wrap; }
  .resource-link { font-size: 13px; padding-bottom: 1px; }
  .tag-pill {
    font-size: 9px; padding: 2px 7px; border-radius: 10px;
    letter-spacing: 1px; text-transform: uppercase; border: 1px solid;
  }
  .tag-primary { border-color: var(--teal); color: var(--teal); }
  .tag-supplement { border-color: #555; color: #666; }
  .resource-note { font-size: 11px; color: #666; margin-top: 3px; }

  /* LEGEND */
  .legend {
    padding: 20px 24px; border: 1px solid var(--border);
    border-radius: 10px; background: var(--bg3); margin-top: 8px;
  }
  .legend-items { display: flex; flex-wrap: wrap; gap: 16px; margin-top: 12px; }
  .legend-item { display: flex; align-items: center; gap: 7px; font-size: 12px; color: var(--muted); }
  .legend-dot { width: 10px; height: 10px; border-radius: 50%; flex-shrink: 0; }

  /* PRINT */
  @media print {
    .phase-nav, .check-circle { display: none; }
    .lecture-body { display: block !important; }
    body { background: white; color: black; }
  }

  /* RESPONSIVE */
  @media (max-width: 500px) {
    .lecture-header { padding: 12px 12px; gap: 9px; }
    .lecture-body { padding: 0 12px 14px; }
    .resource-row { padding: 8px 10px; }
  }
</style>
</head>

const PLATFORM_COLORS = {
  "Coursera":"#0056D2","YouTube":"#FF0000","Khan Academy":"#14BF96","NPTEL":"#FF6B00"
};
const PLATFORM_ICONS = {
  "Coursera":"🎓","YouTube":"▶","Khan Academy":"📐","NPTEL":"🏛"
};

let completedSet = new Set(JSON.parse(localStorage.getItem('bs_completed') || '[]'));
let expandedSet = new Set([1]);

function saveCompleted() {
  localStorage.setItem('bs_completed', JSON.stringify([...completedSet]));
}

function updateProgress() {
  const total = PHASES.reduce((a,p) => a + p.lectures.length, 0);
  const done = completedSet.size;
  const pct = Math.round((done / total) * 100);
  document.getElementById('prog-text').textContent = `${done} of ${total} lectures completed`;
  document.getElementById('prog-pct').textContent = `${pct}%`;
  document.getElementById('prog-fill').style.width = pct + '%';
}

function toggleComplete(e, id) {
  e.stopPropagation();
  if (completedSet.has(id)) completedSet.delete(id);
  else completedSet.add(id);
  saveCompleted();
  renderAll();
}

function toggleExpand(id) {
  if (expandedSet.has(id)) expandedSet.delete(id);
  else expandedSet.add(id);
  renderAll();
}

function renderAll() {
  renderPhaseNav();
  renderMain();
  updateProgress();
}

function renderPhaseNav() {
  const nav = document.getElementById('phase-nav');
  nav.innerHTML = PHASES.map(p => `
    <button class="phase-btn" onclick="document.getElementById('${p.id}').scrollIntoView({behavior:'smooth',block:'start'})"
      style="border:1px solid ${p.color}44; color:${p.color};">
      ${p.phase}
    </button>
  `).join('');
}

function renderMain() {
  const main = document.getElementById('main-content');
  main.innerHTML = PHASES.map((phase, pi) => {
    const lecturesHtml = phase.lectures.map(lec => renderLecture(lec, phase.color)).join('');
    return `
      <div class="phase-block" id="${phase.id}">
        <div class="phase-header" style="border-bottom:2px solid ${phase.color}33;">
          <div class="phase-circle" style="border:2px solid ${phase.color};background:${phase.color}11;color:${phase.color};">
            P${pi+1}
          </div>
          <div class="phase-title-wrap">
            <div class="phase-label" style="color:${phase.color};">${phase.phase}</div>
            <div class="phase-name">${phase.title}</div>
          </div>
          <div class="phase-count">${phase.lectures.length} lecture${phase.lectures.length>1?'s':''}</div>
        </div>
        <div class="lecture-list">${lecturesHtml}</div>
      </div>
    `;
  }).join('') + renderLegend();
}

function renderLecture(lec, phaseColor) {
  const isDone = completedSet.has(lec.id);
  const isOpen = expandedSet.has(lec.id);
  const topicsHtml = lec.topics.map(t => `<span class="topic-pill">${t}</span>`).join('');
  const resourcesHtml = lec.resources.map(r => {
    const pc = PLATFORM_COLORS[r.type] || '#4ECDC4';
    const pi = PLATFORM_ICONS[r.type] || '🔗';
    return `
      <div class="resource-row ${r.tag==='Primary'?'primary-res':''}">
        <div class="platform-icon" style="background:${pc}22;">${pi}</div>
        <div class="resource-info">
          <div class="resource-top">
            <a href="${r.url}" target="_blank" rel="noopener noreferrer"
               class="resource-link" style="color:${pc};border-bottom:1px solid ${pc}44;">
              ${r.label}
            </a>
            <span class="tag-pill ${r.tag==='Primary'?'tag-primary':'tag-supplement'}">${r.tag}</span>
          </div>
          <div class="resource-note">${r.note}</div>
        </div>
      </div>
    `;
  }).join('');

  return `
    <div class="lecture-card ${isDone?'done':''}" style="border-color:${isDone?phaseColor+'55':'#1e1e3a'}">
      <div class="lecture-header" onclick="toggleExpand(${lec.id})">
        <div class="check-circle ${isDone?'checked':''}" onclick="toggleComplete(event,${lec.id})">
          ${isDone?'✓':''}
        </div>
        <div class="lec-num" style="background:${phaseColor}22;border:1px solid ${phaseColor}44;color:${phaseColor};">
          ${lec.id}
        </div>
        <div style="flex:1;">
          <div class="lec-title ${isDone?'done':''}">${lec.title}</div>
          <div class="lec-meta">${lec.topics.length} topics · ${lec.resources.length} resources</div>
        </div>
        <span class="lec-arrow ${isOpen?'open':''}">▾</span>
      </div>
      ${isOpen ? `
        <div class="lecture-body">
          <div class="section-label">Topics Covered</div>
          <div class="topics-wrap">${topicsHtml}</div>
          <div class="section-label">Resources</div>
          <div class="resources-list">${resourcesHtml}</div>
        </div>
      ` : ''}
    </div>
  `;
}

function renderLegend() {
  const platforms = Object.entries(PLATFORM_COLORS).map(([name,color]) => `
    <div class="legend-item">
      <div class="legend-dot" style="background:${color};"></div>
      ${PLATFORM_ICONS[name]} ${name}
    </div>
  `).join('');
  return `
    <div class="legend">
      <div class="section-label">Legend</div>
      <div class="legend-items">
        ${platforms}
        <div class="legend-item">
          <span class="tag-pill tag-primary">PRIMARY</span> Main resource
        </div>
        <div class="legend-item">
          <span class="tag-pill tag-supplement">SUPPLEMENT</span> Supporting resource
        </div>
        <div class="legend-item" style="color:#555;font-size:11px;">
          ✓ Click the circle on any lecture to mark it complete
        </div>
      </div>
    </div>
  `;
}

// Init
renderAll();
</script>
