<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Statistics Roadmap — Lecture by Lecture</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;900&family=DM+Sans:wght@400;500;600&family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet"/>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#080810;
  --surface:#0f0f1a;
  --border:#1e1e30;
  --text:#e0e0f0;
  --muted:#666688;
  --accent:#a78bfa;
}
body{background:var(--bg);color:var(--text);font-family:'DM Sans',sans-serif;padding:40px 16px 100px;min-height:100vh}
.wrap{max-width:820px;margin:0 auto}

/* HEADER */
.hero{text-align:center;margin-bottom:64px}
.hero-tag{font-family:'JetBrains Mono',monospace;font-size:11px;letter-spacing:5px;text-transform:uppercase;color:var(--muted);margin-bottom:14px}
.hero h1{font-family:'Playfair Display',serif;font-size:clamp(28px,5vw,46px);line-height:1.15;color:#fff}
.hero h1 span{background:linear-gradient(135deg,#a78bfa,#60a5fa);-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.hero p{color:var(--muted);margin-top:14px;font-size:14px;line-height:1.7;max-width:540px;margin-left:auto;margin-right:auto}

/* PROGRESS BAR */
.progress-bar{background:var(--surface);border-radius:100px;height:6px;margin-bottom:48px;overflow:hidden;border:1px solid var(--border)}
.progress-fill{height:100%;width:0%;background:linear-gradient(90deg,#a78bfa,#60a5fa,#34d399);border-radius:100px;transition:width 0.6s ease}

/* SECTION HEADER */
.section-group{margin-bottom:10px;margin-top:40px}
.section-group:first-of-type{margin-top:0}
.group-label{font-family:'JetBrains Mono',monospace;font-size:10px;letter-spacing:4px;text-transform:uppercase;color:var(--muted);margin-bottom:14px;padding-left:4px;display:flex;align-items:center;gap:10px}
.group-label::after{content:'';flex:1;height:1px;background:var(--border)}

/* LECTURE CARD */
.lec-card{background:var(--surface);border:1px solid var(--border);border-radius:14px;margin-bottom:10px;overflow:hidden;transition:border-color 0.25s,box-shadow 0.25s;cursor:pointer}
.lec-card:hover{border-color:#333355}
.lec-card.done{border-color:#1a3a2a}
.lec-card.open{border-color:var(--lec-color);box-shadow:0 0 28px var(--lec-glow)}

/* CARD TOP */
.lec-top{display:flex;align-items:center;gap:14px;padding:16px 18px}
.lec-num{font-family:'JetBrains Mono',monospace;font-size:10px;color:var(--lec-color);background:var(--lec-faint);border:1px solid var(--lec-dim);border-radius:6px;padding:4px 8px;white-space:nowrap;flex-shrink:0}
.lec-title-block{flex:1;min-width:0}
.lec-title{font-weight:600;font-size:15px;color:#fff;line-height:1.3}
.lec-subtitle{font-size:12px;color:var(--muted);margin-top:2px}
.lec-right{display:flex;align-items:center;gap:10px;flex-shrink:0}
.done-check{width:22px;height:22px;border-radius:50%;border:2px solid var(--border);display:flex;align-items:center;justify-content:center;font-size:12px;transition:all 0.2s;flex-shrink:0;cursor:pointer}
.done-check.checked{background:#1a3a2a;border-color:#34d399;color:#34d399}
.arrow-icon{font-size:18px;color:var(--lec-color);transition:transform 0.3s;line-height:1}
.lec-card.open .arrow-icon{transform:rotate(90deg)}

/* CARD BODY */
.lec-body{display:none;padding:0 18px 18px}
.lec-card.open .lec-body{display:block}
.topic-row{display:flex;flex-wrap:wrap;gap:6px;margin-bottom:16px}
.topic-pill{font-size:11px;padding:3px 11px;border-radius:20px;background:var(--lec-faint);color:var(--lec-color);border:1px solid var(--lec-dim)}
.resources-label{font-family:'JetBrains Mono',monospace;font-size:9px;letter-spacing:3px;text-transform:uppercase;color:var(--muted);margin-bottom:10px}
.res-list{display:flex;flex-direction:column;gap:8px}

/* RESOURCE ITEM */
.res-item{background:var(--bg);border-radius:10px;padding:12px 14px;border:1px solid var(--border);display:flex;gap:12px;align-items:flex-start;text-decoration:none;transition:border-color 0.2s}
.res-item:hover{border-color:#333355}
.res-icon{font-size:20px;flex-shrink:0;margin-top:1px}
.res-content{flex:1;min-width:0}
.res-name{font-weight:600;font-size:14px;color:#fff;display:block}
.res-desc{font-size:12px;color:var(--muted);margin-top:3px;line-height:1.5}
.res-tags{display:flex;flex-wrap:wrap;gap:5px;margin-top:8px}
.res-tag{font-size:10px;padding:2px 8px;border-radius:20px}
.tag-free{background:#0f2a1a;color:#34d399;border:1px solid #1a4a2a}
.tag-book{background:#1a1a0f;color:#fbbf24;border:1px solid #3a3a1a}
.tag-video{background:#1a0f2a;color:#a78bfa;border:1px solid #3a1a5a}
.tag-channel{background:#0f1a2a;color:#60a5fa;border:1px solid #1a3a5a}

/* SPECIAL NOTE */
.note-box{margin-top:12px;background:#0f0f18;border-left:3px solid var(--lec-color);padding:10px 14px;border-radius:0 8px 8px 0;font-size:12px;color:var(--muted);line-height:1.6}
.note-box strong{color:#fff}

/* STATS FOOTER */
.stats-row{display:flex;gap:12px;flex-wrap:wrap;margin-top:52px}
.stat-box{flex:1;min-width:140px;background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:18px;text-align:center}
.stat-num{font-family:'Playfair Display',serif;font-size:28px;background:linear-gradient(135deg,#a78bfa,#60a5fa);-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.stat-label{font-size:12px;color:var(--muted);margin-top:4px}

/* COMPLETE BTN */
.complete-all{display:block;width:100%;margin-top:16px;padding:14px;background:linear-gradient(135deg,#a78bfa22,#60a5fa22);border:1px solid #a78bfa44;border-radius:12px;color:#a78bfa;font-family:'JetBrains Mono',monospace;font-size:12px;letter-spacing:2px;text-transform:uppercase;cursor:pointer;transition:all 0.2s;text-align:center}
.complete-all:hover{background:linear-gradient(135deg,#a78bfa33,#60a5fa33)}
</style>
</head>

// Color utilities
function hexToVars(hex) {
  return {
    color: hex,
    dim: hex + "44",
    faint: hex + "12",
    glow: hex + "18"
  };
}

const roadmapEl = document.getElementById("roadmap");
let doneSet = new Set(JSON.parse(localStorage.getItem("doneLectures") || "[]"));

function saveDone() {
  try { localStorage.setItem("doneLectures", JSON.stringify([...doneSet])); } catch(e) {}
}

function updateProgress() {
  const total = document.querySelectorAll(".lec-card").length;
  const done = doneSet.size;
  const pct = (done / total) * 100;
  document.getElementById("progressFill").style.width = pct + "%";
  document.getElementById("doneCount").textContent = done;
}

lectures.forEach(group => {
  const groupWrap = document.createElement("div");
  groupWrap.className = "section-group";

  const gl = document.createElement("div");
  gl.className = "group-label";
  gl.textContent = group.group;
  groupWrap.appendChild(gl);

  group.items.forEach(lec => {
    const cv = hexToVars(lec.color);
    const card = document.createElement("div");
    card.className = "lec-card" + (doneSet.has(lec.num) ? " done" : "");
    card.style.setProperty("--lec-color", cv.color);
    card.style.setProperty("--lec-dim", cv.dim);
    card.style.setProperty("--lec-faint", cv.faint);
    card.style.setProperty("--lec-glow", cv.glow);

    const tagHTML = (tags) => tags.map(t => {
      const cl = t === "free" ? "tag-free" : t === "book" ? "tag-book" : t === "video" ? "tag-video" : "tag-channel";
      const label = t === "free" ? "FREE" : t === "book" ? "TEXTBOOK" : t === "video" ? "VIDEO" : "CHANNEL";
      return `<span class="res-tag ${cl}">${label}</span>`;
    }).join("");

    const resHTML = lec.resources.map(r => `
      <a class="res-item" href="${r.url}" target="_blank" rel="noreferrer">
        <span class="res-icon">${r.icon}</span>
        <div class="res-content">
          <span class="res-name">${r.name}</span>
          <div class="res-desc">${r.desc}</div>
          <div class="res-tags">${tagHTML(r.tags)}</div>
        </div>
      </a>
    `).join("");

    card.innerHTML = `
      <div class="lec-top">
        <span class="lec-num">${lec.num}</span>
        <div class="lec-title-block">
          <div class="lec-title">${lec.title}</div>
          <div class="lec-subtitle">${lec.subtitle}</div>
        </div>
        <div class="lec-right">
          <div class="done-check ${doneSet.has(lec.num) ? "checked" : ""}" data-id="${lec.num}">${doneSet.has(lec.num) ? "✓" : ""}</div>
          <div class="arrow-icon">›</div>
        </div>
      </div>
      <div class="lec-body">
        <div class="topic-row">${lec.topics.map(t => `<span class="topic-pill">${t}</span>`).join("")}</div>
        <div class="resources-label">Resources for this lecture</div>
        <div class="res-list">${resHTML}</div>
        ${lec.note ? `<div class="note-box">💡 <strong>Exam tip:</strong> ${lec.note}</div>` : ""}
      </div>
    `;

    // Toggle expand
    card.querySelector(".lec-top").addEventListener("click", (e) => {
      if (e.target.closest(".done-check")) return;
      document.querySelectorAll(".lec-card.open").forEach(c => { if(c !== card) c.classList.remove("open"); });
      card.classList.toggle("open");
    });

    // Done checkbox
    card.querySelector(".done-check").addEventListener("click", (e) => {
      e.stopPropagation();
      const id = e.currentTarget.dataset.id;
      if (doneSet.has(id)) {
        doneSet.delete(id);
        e.currentTarget.classList.remove("checked");
        e.currentTarget.textContent = "";
        card.classList.remove("done");
      } else {
        doneSet.add(id);
        e.currentTarget.classList.add("checked");
        e.currentTarget.textContent = "✓";
        card.classList.add("done");
      }
      saveDone();
      updateProgress();
    });

    groupWrap.appendChild(card);
  });

  roadmapEl.appendChild(groupWrap);
});

updateProgress();
</script>
